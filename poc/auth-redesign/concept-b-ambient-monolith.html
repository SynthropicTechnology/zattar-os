<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZattarOS Auth — Concept B: Ambient Monolith</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@400;500;600;700;800&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  /* ================================================================
     CONCEPT B — AMBIENT MONOLITH
     Evolucao do layout atual: card centralizado + mesh gradient animado.
     Sistema INTERNO — sem social login, sem signup.
     ================================================================ */

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --primary: oklch(0.48 0.26 281);
    --primary-foreground: oklch(1.0 0 0);
    --background: oklch(0.96 0.01 281);
    --foreground: oklch(0.15 0.01 281);
    --card: oklch(1.0 0 0);
    --muted: oklch(0.92 0.01 281);
    --muted-foreground: oklch(0.42 0.01 281);
    --border: oklch(0.87 0.01 281);
    --input: oklch(0.87 0.01 281);
    --destructive: oklch(0.55 0.22 25);
    --success: oklch(0.55 0.18 145);
    --secondary: oklch(0.95 0.04 281);
    --radius: 0.5rem;
    --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-heading: 'Montserrat', sans-serif;
    --font-headline: 'Manrope', sans-serif;
  }

  html { font-size: 16px; -webkit-font-smoothing: antialiased; }

  body {
    font-family: var(--font-sans);
    background: var(--background);
    color: var(--foreground);
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* ── BACKGROUND ────────────────────────────────────────── */
  .canvas-dots {
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, oklch(0 0 0 / 0.06) 0.8px, transparent 0.8px);
    background-size: 14px 14px;
    pointer-events: none;
    z-index: 0;
  }

  .mesh-gradient { position: fixed; inset: 0; pointer-events: none; z-index: 1; overflow: hidden; }

  .mesh-blob { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.5; }

  .mesh-blob-1 {
    width: 600px; height: 600px;
    background: oklch(0.48 0.26 281 / 0.12);
    top: -10%; right: -5%;
    animation: mesh-float-1 20s ease-in-out infinite;
  }

  .mesh-blob-2 {
    width: 500px; height: 500px;
    background: oklch(0.60 0.22 45 / 0.06);
    bottom: -15%; left: -10%;
    animation: mesh-float-2 25s ease-in-out infinite;
  }

  .mesh-blob-3 {
    width: 400px; height: 400px;
    background: oklch(0.55 0.18 250 / 0.05);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    animation: mesh-float-3 18s ease-in-out infinite;
  }

  @keyframes mesh-float-1 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(-40px, 30px) scale(1.1); }
    66% { transform: translate(20px, -20px) scale(0.95); }
  }

  @keyframes mesh-float-2 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(50px, -30px) scale(1.05); }
    66% { transform: translate(-30px, 40px) scale(1.1); }
  }

  @keyframes mesh-float-3 {
    0%, 100% { transform: translate(-50%, -50%) scale(1); }
    50% { transform: translate(-50%, -50%) scale(1.2); }
  }

  /* ── MAIN CONTENT ──────────────────────────────────────── */
  .auth-wrapper {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 420px;
    padding: 1rem;
  }

  /* Logo */
  .brand-mark {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.25rem;
    margin-bottom: 2rem;
  }

  .brand-mark img { height: 56px; width: auto; }

  .dark .logo-light { display: none; }
  .dark .logo-dark { display: block; }
  .logo-dark { display: none; }

  /* Glass card */
  .glass-card {
    width: 100%;
    background: rgba(255, 255, 255, 0.62);
    backdrop-filter: blur(20px) saturate(1.3);
    -webkit-backdrop-filter: blur(20px) saturate(1.3);
    border: 1px solid rgba(255, 255, 255, 0.50);
    border-radius: 20px;
    padding: 2.5rem;
    box-shadow:
      0 0 0 1px oklch(0 0 0 / 0.02),
      0 2px 4px oklch(0 0 0 / 0.02),
      0 8px 24px oklch(0 0 0 / 0.04),
      0 24px 48px oklch(0 0 0 / 0.06);
  }

  /* Greeting */
  .greeting { text-align: center; margin-bottom: 2rem; }

  .greeting-title {
    font-family: var(--font-headline);
    font-weight: 800;
    font-size: 1.75rem;
    color: var(--foreground);
    letter-spacing: -0.03em;
    line-height: 1.15;
  }

  .greeting-sub {
    margin-top: 0.5rem;
    font-size: 0.875rem;
    color: var(--muted-foreground);
    line-height: 1.5;
  }

  /* Form fields */
  .field { margin-bottom: 1rem; }

  .field-label {
    display: block;
    font-size: 0.875rem;
    font-weight: 500;
    color: var(--foreground);
    margin-bottom: 0.375rem;
  }

  .field-input {
    width: 100%;
    height: 44px;
    padding: 0 0.875rem;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--card);
    font-family: var(--font-sans);
    font-size: 0.875rem;
    color: var(--foreground);
    transition: all 0.2s ease;
    outline: none;
  }

  .field-input::placeholder { color: oklch(0.55 0.005 281); }

  .field-input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px oklch(0.48 0.26 281 / 0.08);
  }

  .field-input-wrapper { position: relative; }

  .field-toggle {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--muted-foreground);
    opacity: 0.4;
    cursor: pointer;
    padding: 4px;
    transition: opacity 0.2s;
  }

  .field-toggle:hover { opacity: 0.8; }

  /* Error */
  .error-alert {
    display: none;
    align-items: flex-start;
    gap: 0.5rem;
    padding: 0.75rem;
    border-radius: var(--radius);
    border: 1px solid oklch(0.55 0.22 25 / 0.15);
    background: oklch(0.55 0.22 25 / 0.05);
    margin-bottom: 1rem;
    animation: slide-in 0.25s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .error-alert.visible { display: flex; }
  .error-alert svg { flex-shrink: 0; margin-top: 1px; color: var(--destructive); }
  .error-alert p { font-size: 0.8125rem; color: var(--destructive); line-height: 1.4; }

  @keyframes slide-in {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Submit */
  .btn-primary {
    width: 100%;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    border: none;
    border-radius: var(--radius);
    background: var(--primary);
    color: var(--primary-foreground);
    font-family: var(--font-sans);
    font-size: 0.9375rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    letter-spacing: -0.01em;
    margin-top: 0.25rem;
  }

  .btn-primary:hover {
    filter: brightness(1.1);
    box-shadow: 0 6px 24px oklch(0.48 0.26 281 / 0.3);
  }

  .btn-primary:active { transform: scale(0.98); }

  .btn-primary:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }

  .btn-primary svg { transition: transform 0.2s ease; }
  .btn-primary:hover svg { transform: translateX(2px); }

  /* Forgot link */
  .form-footer {
    text-align: center;
    margin-top: 1.5rem;
  }

  .form-footer a {
    font-size: 0.75rem;
    color: var(--muted-foreground);
    opacity: 0.6;
    text-decoration: none;
    transition: all 0.2s ease;
  }

  .form-footer a:hover { opacity: 1; color: var(--primary); }

  /* Powered by */
  .powered-by {
    margin-top: 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 11px;
    color: var(--muted-foreground);
    opacity: 0.35;
  }

  .powered-by::before {
    content: '';
    width: 12px;
    height: 1px;
    background: currentColor;
  }

  /* ── THEME TOGGLE ──────────────────────────────────────── */
  .theme-toggle {
    position: fixed;
    top: 1rem;
    right: 1rem;
    z-index: 100;
    width: 40px;
    height: 40px;
    border: 1px solid oklch(0.5 0 0 / 0.12);
    border-radius: 10px;
    background: oklch(1 0 0 / 0.5);
    backdrop-filter: blur(8px);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    color: var(--foreground);
  }

  .theme-toggle:hover { background: oklch(1 0 0 / 0.7); }

  /* ── DARK MODE ────────────────────────────────────────── */
  .dark {
    --primary: oklch(0.70 0.20 281);
    --primary-foreground: oklch(0.15 0.10 281);
    --background: oklch(0.17 0.005 281);
    --foreground: oklch(0.98 0 0);
    --card: oklch(0.22 0.005 281);
    --muted: oklch(0.28 0.005 281);
    --muted-foreground: oklch(0.65 0.005 281);
    --border: oklch(1.0 0 0 / 0.12);
    --secondary: oklch(0.28 0.01 281);
    --destructive: oklch(0.65 0.20 25);
  }

  .dark .canvas-dots {
    background-image: radial-gradient(circle, oklch(1 0 0 / 0.03) 0.8px, transparent 0.8px);
  }

  .dark .mesh-blob-1 { background: oklch(0.70 0.20 281 / 0.08); }
  .dark .mesh-blob-2 { background: oklch(0.70 0.20 45 / 0.04); }
  .dark .mesh-blob-3 { background: oklch(0.70 0.18 250 / 0.03); }

  .dark .glass-card {
    background: oklch(0.22 0.005 281 / 0.55);
    border-color: oklch(1 0 0 / 0.08);
    box-shadow: 0 0 0 1px oklch(1 0 0 / 0.02), 0 8px 24px oklch(0 0 0 / 0.15), 0 24px 48px oklch(0 0 0 / 0.20);
  }

  .dark .theme-toggle {
    background: oklch(0.22 0.005 281 / 0.5);
    border-color: oklch(1 0 0 / 0.08);
    color: oklch(0.98 0 0);
  }

  /* ── RESPONSIVE ───────────────────────────────────────── */
  @media (max-width: 480px) {
    .glass-card { padding: 1.5rem; border-radius: 16px; }
    .greeting-title { font-size: 1.5rem; }
  }

  @media (prefers-reduced-motion: reduce) {
    .mesh-blob { animation: none !important; }
    .btn-primary svg { transition: none; }
    .error-alert { animation: none; }
  }
</style>
</head>
<body>

<button class="theme-toggle" onclick="document.body.classList.toggle('dark')" aria-label="Alternar tema">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
  </svg>
</button>

<div class="canvas-dots"></div>
<div class="mesh-gradient">
  <div class="mesh-blob mesh-blob-1"></div>
  <div class="mesh-blob mesh-blob-2"></div>
  <div class="mesh-blob mesh-blob-3"></div>
</div>

<!-- ═══ AUTH WRAPPER ═══ -->
<div class="auth-wrapper">
  <div class="brand-mark">
    <img src="../../public/logos/Sem Fundo SVG/logo-zattar-dark.svg" alt="Zattar Advogados" class="logo-light">
    <img src="../../public/logos/Sem Fundo SVG/logo-zattar-light.svg" alt="Zattar Advogados" class="logo-dark">
  </div>

  <div class="glass-card">
    <div class="greeting">
      <h1 class="greeting-title">Bem-vindo de volta.</h1>
      <p class="greeting-sub">Entre com suas credenciais para acessar o sistema</p>
    </div>

    <form onsubmit="return false;">
      <div class="field">
        <label class="field-label" for="email">Email</label>
        <input class="field-input" id="email" type="email" placeholder="voce@zattar.com.br" autocomplete="email" required>
      </div>

      <div class="field">
        <label class="field-label" for="password">Senha</label>
        <div class="field-input-wrapper">
          <input class="field-input" id="password" type="password" placeholder="Digite sua senha" autocomplete="current-password" required style="padding-right: 2.5rem;">
          <button type="button" class="field-toggle" aria-label="Mostrar senha" onclick="togglePassword()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="error-alert" id="error" role="alert">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <p>Email ou senha incorretos</p>
      </div>

      <button type="submit" class="btn-primary">
        Entrar
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
      </button>
    </form>

    <div class="form-footer">
      <a href="#">Esqueci minha senha</a>
    </div>
  </div>

  <div class="powered-by">Synthropic</div>
</div>

<script>
function togglePassword() {
  const input = document.getElementById('password');
  input.type = input.type === 'password' ? 'text' : 'password';
}
</script>
</body>
</html>
